<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (() => {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>DupeTips Research Docs</title>
    <meta
      name="description"
      content="Documentation-style research notes for studying Minecraft plugin bugs on authorized servers only."
    />

    <meta property="og:title" content="DupeTips" />
    <meta
      property="og:description"
      content="Docs for learning mc bug hunting and duping."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dupe.tips/" />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:site_name" content="DupeTips" />
    <meta name="theme-color" content="#22c55e" />

  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
